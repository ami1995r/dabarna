<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>دبرنا پرمیوم | رقابت آنلاین و شرط‌بندی با سکه</title>
  
  <!-- Tailwind CSS Stable Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts - Vazirmatn (بهترین فونت فارسی) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

  <!-- Canvas Confetti for professional victory events -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: 'Vazirmatn', sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.4s ease, color 0.4s ease;
    }
    
    /* Elegant smooth transitions */
    .smooth-transition {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Custom thin scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(128, 128, 128, 0.3);
      border-radius: 99px;
    }

    /* Minimalist continuous glow */
    .neon-pulse {
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }
    .dark .neon-pulse {
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
    }

    /* Lucky wheel custom animations */
    .wheel-transition {
      transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
    }
  </style>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            theme: {
              lightBg: '#f8fafc',
              lightCard: '#ffffff',
              lightBorder: '#e2e8f0',
              darkBg: '#09090b',
              darkCard: '#18181b',
              darkBorder: '#27272a'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-theme-lightBg text-slate-900 dark:bg-theme-darkBg dark:text-neutral-100 min-h-screen flex flex-col antialiased">

  <!-- Header Minimalist Bar -->
  <header class="border-b border-theme-lightBorder dark:border-theme-darkBorder bg-white/70 dark:bg-theme-darkCard/70 backdrop-blur-md sticky top-0 z-40 px-4 py-3.5 flex items-center justify-between smooth-transition">
    <div class="flex items-center gap-3">
      <div class="cursor-pointer flex items-center gap-2" onclick="navigateTo('home')">
        <span class="text-xl font-black tracking-widest text-slate-950 dark:text-white">DABRNA</span>
        <span class="text-[10px] bg-slate-950 text-white dark:bg-white dark:text-black font-bold px-2 py-0.5 rounded-md">PRO</span>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <!-- Coins counter -->
      <div class="flex items-center gap-1.5 bg-slate-100 dark:bg-neutral-800 px-3 py-1 rounded-full text-xs font-bold">
        <span class="text-amber-500">🪙</span>
        <span id="header-user-coins">۰</span>
      </div>

      <!-- Mode Toggle (Day / Night Minimalist Button) -->
      <button onclick="toggleDayNightMode()" class="p-2 rounded-xl bg-slate-100 dark:bg-neutral-800 hover:bg-slate-200 dark:hover:bg-neutral-700 transition-colors" title="تغییر تم رنگی">
        <span id="theme-icon-light" class="hidden">☀️</span>
        <span id="theme-icon-dark">🌙</span>
      </button>

      <!-- Audio Toggle -->
      <button onclick="toggleAudioMute()" class="p-2 rounded-xl bg-slate-100 dark:bg-neutral-800 hover:bg-slate-200 dark:hover:bg-neutral-700 transition-colors">
        <span id="audio-icon">🔊</span>
      </button>

      <!-- Admin Access Trigger -->
      <button onclick="navigateTo('admin')" class="p-2 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500/20 transition-colors" title="پنل مدیریت ادمین">
        <span>🔑 ادمین</span>
      </button>

      <!-- Profile Icon & Unique Code -->
      <div class="flex items-center gap-2 cursor-pointer border-r border-slate-200 dark:border-neutral-800 pr-3" onclick="navigateTo('profile')">
        <div id="header-user-avatar-container" class="w-8 h-8 rounded-full border border-slate-300 dark:border-neutral-700 overflow-hidden">
          <!-- Dynamic SVG Avatar injected -->
        </div>
        <div class="hidden sm:block text-right">
          <div id="header-user-nickname" class="text-xs font-bold">نام کاربر</div>
          <div id="header-user-unique-id" class="text-[9px] text-slate-400 font-mono">DAB-0000</div>
        </div>
      </div>
    </div>
  </header>

  <!-- Notification Alert Banner -->
  <div id="system-alert-banner" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-slate-900/90 dark:bg-white/95 text-white dark:text-black py-2.5 px-6 rounded-2xl shadow-2xl flex items-center gap-2 text-xs font-bold border border-white/10 dark:border-black/10 transition-all duration-300 transform translate-y-[-100px] opacity-0 pointer-events-none">
    <span id="alert-text-span">اعلان سیستم</span>
  </div>

  <!-- Main View Container -->
  <main id="app-viewport" class="flex-1 flex flex-col p-4 md:p-6 w-full max-w-7xl mx-auto">
    <!-- Content injected dynamically via Vanilla JS Router -->
  </main>

  <!-- Footer Branding -->
  <footer class="border-t border-theme-lightBorder dark:border-theme-darkBorder py-5 text-center text-[10px] text-slate-400 dark:text-neutral-500 mt-auto bg-white/30 dark:bg-transparent">
    <p>حقوق بازی دبرنا پرمیوم محفوظ است © ۲۰۲۶ | طراحی مینیمال و امن بدون باگ</p>
  </footer>

  <script>
    // --- STREAMING_CHUNK: Vector Cartoon Avatars Setup... ---
    // Beautiful clean vector graphics (3 Males, 3 Females) which work completely offline!
    const SVG_AVATARS = [
      // 0: Male 1 (Trendy Beard & Glasses)
      `<svg viewBox="0 0 100 100" class="w-full h-full bg-slate-200 dark:bg-neutral-800">

      // 3: Female 2 (Elegant Bob Haircut)
      `<svg viewBox="0 0 100 100" class="w-full h-full bg-slate-200 dark:bg-neutral-800">
        <circle cx="50" cy="50" r="40" fill="#fbcfe8"/>
        <path d="M25 45 C 20 20, 80 20, 75 45 C 75 70, 25 70, 25 45 Z" fill="#0f172a"/>
        <circle cx="50" cy="48" r="20" fill="#ffedd5"/>
        <circle cx="43" cy="44" r="2" fill="#000"/>
        <circle cx="57" cy="44" r="2" fill="#000"/>

        <path d="M30 78 C 30 65, 70 65, 70 78 Z" fill="#1e293b"/>
      </svg>`,
      // 4: Male 3 (Cool Curly Hair style)
      `<svg viewBox="0 0 100 100" class="w-full h-full bg-slate-200 dark:bg-neutral-800">
        <circle cx="50" cy="50" r="40" fill="#cbd5e1"/>
        <circle cx="38" cy="35" r="12" fill="#18181b"/>

        <circle cx="50" cy="30" r="14" fill="#18181b"/>
        <circle cx="50" cy="48" r="20" fill="#fecaca"/>
        <circle cx="43" cy="44" r="2.5" fill="#18181b"/>
        <circle cx="57" cy="44" r="2.5" fill="#18181b"/>
        <path d="M42 56 Q 50 51 58 56" stroke="#18181b" stroke-width="2.5" fill="none"/>
        <path d="M30 78 C 30 63, 70 63, 70 78 Z" fill="#0f172a"/>
      </svg>`,
      // 5: Female 3 (Long hair with headband)
      `<svg viewBox="0 0 100 100" class="w-full h-full bg-slate-200 dark:bg-neutral-800">
        <circle cx="50" cy="50" r="40" fill="#c084fc"/>
        <path d="M22 35 C 10 50, 90 50, 78 35 C 70 15, 30 15, 22 35 Z" fill="#581c87"/>
        <circle cx="50" cy="50" r="20" fill="#fed7aa"/>
        <circle cx="43" cy="47" r="2" fill="#000"/>
        <circle cx="57" cy="47" r="2" fill="#000"/>
        <path d="M44 57 Q 50 62 56 57" stroke="#7c2d12" stroke-width="2.5" fill="none"/>
        <path d="M32 78 C 32 64, 68 64, 68 78 Z" fill="#1e293b"/>
      </svg>`
    ];

    const BOT_NAMES = ["آرش_تندپنجه", "نازنین_خوش‌شانس", "کامیار_دبرنا", "الهام_سکوت", "مهران_سریع", "رویا_قهرمان"];

    const PERSUASIVE_VOICES = [
      { id: 'female-normal', name: 'مریم (رسمی)', lang: 'fa-IR', rate: 1.0, pitch: 1.1 },
      { id: 'male-cool', name: 'پیمان (بامزه)', lang: 'fa-IR', rate: 1.1, pitch: 0.95 },
      { id: 'english-fun', name: 'English (شادی)', lang: 'en-US', rate: 1.2, pitch: 1.1 }
    ];

    // Minimal Monochrome Game Card Designs
    const CARD_STYLES = [
      { id: 'standard', name: 'مینیمال کلاسیک', bg: 'bg-white dark:bg-zinc-900', cell: 'border-slate-200 dark:border-zinc-800', active: 'bg-slate-950 text-white dark:bg-white dark:text-black font-extrabold shadow-md' },
      { id: 'monochrome-bold', name: 'سیاه و سفید برجسته', bg: 'bg-neutral-100 dark:bg-zinc-950', cell: 'border-neutral-300 dark:border-zinc-800', active: 'bg-neutral-900 text-white dark:bg-zinc-100 dark:text-neutral-950 font-black ring-2 ring-neutral-950 dark:ring-white' }
    ];

    // --- GLOBAL SYSTEM STATE ---
    let state = {
      screen: 'splash',
      theme: 'dark', // 'light' or 'dark' (Default dark/night mode)
      soundMuted: false,
      voiceLanguage: 'female-normal',
      
      // User data
      user: {
        id: '', // Persistent unique user identifier
        nickname: 'بازیکن مهمان',
        avatarIdx: 0,
        level: 3,
        xp: 140,
        coins: 1250, // Wallet balance
        wins: 14,
        played: 45,
        badges: ['کارت‌باز ماهر', 'اولین برد']
      },

      selectedCardStyle: CARD_STYLES[0],

      // Room Settings State
      roomName: 'کافه دبرنا',
      isPrivate: false,
      roomPassword: '',
      playerLimit: 6,
      gameSpeed: 4, // Seconds per draw
      winningPattern: 'fullhouse', // 'single-line', 'double-line', 'fullhouse'
      autoDraw: true,
      entryFee: 100, // Coin entry fee for betting, 0 means Free

      // Active / Created rooms list
      roomsList: [
        { code: '284019', name: 'کلوب دبرنابازان مرکز ☕️', creator: 'امیر_سریع', entryFee: 50, playersCount: 4, limit: 6, status: 'lobby', isBotOnly: true },
        { code: '990212', name: 'میز سنگین دبرنا طلایی 🏆', creator: 'رویا_قهرمان', entryFee: 500, playersCount: 2, limit: 8, status: 'gameplay', isBotOnly: true },
        { code: '441029', name: 'رقابت دوستانه و رایگان 🍉', creator: 'الهام_سکوت', entryFee: 0, playersCount: 3, limit: 5, status: 'lobby', isBotOnly: true }
      ],

      // Live Room Status
      roomCode: '',
      players: [],
      isHost: true,
      messages: [],

      // Match Gameplay Engine Status
      myCard: [],
      markedCells: [],
      drawnNumbers: [],
      currentNumber: null,
      gameActive: false,
      timer: 0,
      winner: null,
      isDabrnaReady: false,
      isSpectating: false, // Flag indicating if user is watching other people's game

      // Intervals
      drawInterval: null,
      timerInterval: null,

      // Wheel State
      spinAngle: 0,
      isSpinning: false,
      spinReward: null
    };

    // --- STREAMING_CHUNK: Setup and Unique ID Generation... ---
    // Persistent profile configs
    function initUserCredentials() {
      // Create or load persistent unique ID
      let localId = localStorage.getItem('dab_uid');
      if (!localId) {
        localId = 'DAB-' + Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem('dab_uid', localId);
      }
      state.user.id = localId;

      // Load Nickname & Avatar
      const localName = localStorage.getItem('dab_nickname');
      if (localName) state.user.nickname = localName;

      const localAvatarIdx = localStorage.getItem('dab_avatar_idx');
      if (localAvatarIdx !== null) state.user.avatarIdx = parseInt(localAvatarIdx);

      const localTheme = localStorage.getItem('dab_theme');
      if (localTheme) {
        state.theme = localTheme;
      } else {
        state.theme = 'dark'; // Default night mode as requested
      }

      const localCoins = localStorage.getItem('dab_coins_wallet');
      if (localCoins !== null) {
        state.user.coins = parseInt(localCoins);
      } else {
        localStorage.setItem('dab_coins_wallet', state.user.coins);
      }
    }

    function saveUserCredentials() {
      localStorage.setItem('dab_nickname', state.user.nickname);
      localStorage.setItem('dab_avatar_idx', state.user.avatarIdx);
      localStorage.setItem('dab_theme', state.theme);
      localStorage.setItem('dab_coins_wallet', state.user.coins);
    }

    // Sound Synthesizer Engine
    function playLocalSound(type) {
      if (state.soundMuted) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'click') {
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          gain.gain.setValueAtTime(0.05, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.04);
        } else if (type === 'success') {
          osc.frequency.setValueAtTime(440, ctx.currentTime);
          osc.frequency.setValueAtTime(554.37, ctx.currentTime + 0.1);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.08, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.35);
        } else if (type === 'alert') {
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } else if (type === 'draw') {
          osc.frequency.setValueAtTime(350, ctx.currentTime);
          osc.frequency.setValueAtTime(450, ctx.currentTime + 0.05);
          gain.gain.setValueAtTime(0.05, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        }
      } catch (e) {
        console.warn("Audio Context blocked or not supported.");
      }
    }

    // Text to Speech for drawing numbers
    function speakNumber(num) {
      if (state.soundMuted) return;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const voiceConfig = PERSUASIVE_VOICES.find(v => v.id === state.voiceLanguage);
        
        let text = `${num}`;
        if (voiceConfig.lang.startsWith('fa')) {
          const expressions = [
            "عدد بعدی", "مهره شماره", "بشین روی صندلی", "خوش شانس‌ها بردارن", "کارتتو نگاه کن"
          ];
          text = `${expressions[num % expressions.length]}! ${num}`;
        }
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = voiceConfig.lang;
        utterance.rate = voiceConfig.rate;
        utterance.pitch = voiceConfig.pitch;
        window.speechSynthesis.speak(utterance);
      }
    }

    // --- STREAMING_CHUNK: Layout engine and Theme control... ---
    function syncThemeUI() {
      if (state.theme === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-icon-light').classList.remove('hidden');
        document.getElementById('theme-icon-dark').classList.add('hidden');
      } else {
        document.documentElement.classList.remove('dark');
        document.getElementById('theme-icon-light').classList.add('hidden');
        document.getElementById('theme-icon-dark').classList.remove('hidden');
      }
    }

    function toggleDayNightMode() {
      state.theme = (state.theme === 'dark') ? 'light' : 'dark';
      saveUserCredentials();
      syncThemeUI();
      playLocalSound('click');
      // Re-render current viewport to update layout colors cleanly
      renderCurrentScreen();
    }

    function toggleAudioMute() {
      state.soundMuted = !state.soundMuted;
      document.getElementById('audio-icon').innerText = state.soundMuted ? '🔇' : '🔊';
      playLocalSound('click');
    }

    // Notification Alerts without alert()
    function showNotification(message) {
      const banner = document.getElementById('system-alert-banner');
      document.getElementById('alert-text-span').innerText = message;
      banner.classList.remove('opacity-0', 'translate-y-[-100px]', 'pointer-events-none');
      
      setTimeout(() => {
        banner.classList.add('opacity-0', 'translate-y-[-100px]', 'pointer-events-none');
      }, 3000);
    }

    function updateHeaderStats() {
      document.getElementById('header-user-coins').innerText = state.user.coins.toLocaleString('fa-IR');
      document.getElementById('header-user-nickname').innerText = state.user.nickname;
      document.getElementById('header-user-unique-id').innerText = state.user.id;
      document.getElementById('header-user-avatar-container').innerHTML = SVG_AVATARS[state.user.avatarIdx];
    }

    // --- STREAMING_CHUNK: Navigation and Router setup... ---
    function navigateTo(screenId) {
      // Forfeiting rule: if exiting gameplay screen & user was playing actively in betting room
      if (state.screen === 'gameplay' && screenId !== 'gameplay' && !state.isSpectating && state.gameActive) {
        if (state.entryFee > 0) {
          state.user.coins -= state.entryFee;
          saveUserCredentials();
          showNotification(`شما بازی را وسط رقابت ترک کردید! مبلغ ${state.entryFee} سکه از حساب شما کسر و جریمه شدید.`);
        }
        clearInterval(state.drawInterval);
        clearInterval(state.timerInterval);
        state.gameActive = false;
      }

      state.screen = screenId;
      playLocalSound('click');
      renderCurrentScreen();
    }

    // --- STREAMING_CHUNK: Rendering engine screens... ---
    function renderCurrentScreen() {
      const viewport = document.getElementById('app-viewport');
      updateHeaderStats();

      // Dispatch screen renderers
      switch (state.screen) {
        case 'splash':
          viewport.innerHTML = getSplashHTML();
          break;
        case 'login':
          viewport.innerHTML = getLoginHTML();
          break;
        case 'home':
          viewport.innerHTML = getHomeHTML();
          break;
        case 'create-room':
          viewport.innerHTML = getCreateRoomHTML();
          break;
        case 'lobby':
          viewport.innerHTML = getLobbyHTML();
          break;
        case 'gameplay':
          viewport.innerHTML = getGameplayHTML();
          bindGameplayDOM();
          break;
        case 'leaderboard':
          viewport.innerHTML = getLeaderboardHTML();
          break;
        case 'achievements':
          viewport.innerHTML = getAchievementsHTML();
          break;
        case 'profile':
          viewport.innerHTML = getProfileHTML();
          break;
        case 'settings':
          viewport.innerHTML = getSettingsHTML();
          break;
        case 'admin':
          viewport.innerHTML = getAdminHTML();
          break;
        default:
          viewport.innerHTML = getHomeHTML();
      }
    }

    // --- SCREEN HTML GENERATORS ---

    // 1. Splash Screen
    function getSplashHTML() {
      return `
        <div class="flex-1 flex flex-col items-center justify-center text-center py-12">
          <div class="w-24 h-24 bg-slate-950 dark:bg-white text-white dark:text-black rounded-full flex items-center justify-center text-4xl font-black mb-6 animate-bounce-slow">
            🎯
          </div>
          <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-3">دبـرنـا <span class="text-slate-400">پرمیوم</span></h1>
          <p class="text-sm text-slate-400 dark:text-neutral-400 max-w-sm font-light">چالش گروهی شانس، شرط‌بندی و هوش با استایل مینیمال سیاه و سفید</p>
          <div class="w-32 bg-slate-200 dark:bg-neutral-800 h-1 rounded-full overflow-hidden mt-8">
            <div class="bg-slate-950 dark:bg-white h-full w-2/3 rounded-full animate-pulse"></div>
          </div>
        </div>
      `;
    }

    // 2. Login / Setup Screen
    function getLoginHTML() {
      return `
        <div class="flex-1 flex items-center justify-center">
          <div class="glass-panel w-full max-w-md p-8 rounded-3xl shadow-xl border border-slate-200/50 dark:border-neutral-800 bg-white/50 dark:bg-zinc-900/40 text-center">

    // --- STREAMING_CHUNK: Card generation logic and checks... ---

    // Mathematical distribution layout for Iranian classic Dabarna board
    // 3 rows, 9 columns. Each column contains numbers in its tenth range (col 0: 1-9, col 8: 80-90)
    // Every row must contain exactly 5 active numbers and 4 null/empty elements
    function generateMathDabrnaCard() {
      let card = Array(3).fill(null).map(() => Array(9).fill(null));
      let colData = [];

      for (let col = 0; col < 9; col++) {
        let min = col === 0 ? 1 : col * 10;
        let max = col === 8 ? 90 : (col * 10) + 9;
        let pool = [];
        for (let i = min; i <= max; i++) pool.push(i);
        
        // Shuffle and pick 3 numbers sorted vertically
        pool.sort(() => Math.random() - 0.5);
        let chosen = pool.slice(0, 3).sort((a, b) => a - b);
        colData.push(chosen);
      }

      // Fill basic grid
      for (let col = 0; col < 9; col++) {
        for (let row = 0; row < 3; row++) {
          card[row][col] = colData[col][row];
        }
      }

      // Eliminate exactly 4 numbers from each row randomly
      for (let row = 0; row < 3; row++) {
        let emptyIndices = [];
        while (emptyIndices.length < 4) {
          let rand = Math.floor(Math.random() * 9);
          if (!emptyIndices.includes(rand)) {
            emptyIndices.push(rand);
          }
        }
        emptyIndices.forEach(colIdx => {
          card[row][colIdx] = null;
        });
      }

      return card;
    }

    // --- GAMEPLAY CONTROLLER ENGINE ---
    function startGameplay() {
      state.myCard = generateMathDabrnaCard();
      state.markedCells = [];
      state.drawnNumbers = [];
      state.currentNumber = null;
      state.timer = 0;
      state.winner = null;
      state.isDabrnaReady = false;
      state.gameActive = true;

      playLocalSound('success');
      navigateTo('gameplay');

      // Setup Draw loops
      if (state.drawInterval) clearInterval(state.drawInterval);
      if (state.autoDraw) {
        state.drawInterval = setInterval(() => {
          drawMatchNumber();
        }, state.gameSpeed * 1000);
      }

      // Setup clock timer
      if (state.timerInterval) clearInterval(state.timerInterval);
      state.timerInterval = setInterval(() => {
        state.timer++;
        updateGameplayTimerDOM();
        simulateBotsReactionAndMovements();
      }, 1000);
    }

    function drawMatchNumber() {
      if (!state.gameActive || state.winner) return;

      if (state.drawnNumbers.length >= 90) {
        endGameWithDraw();
        return;
      }

      let roll;
      do {
        roll = Math.floor(Math.random() * 90) + 1;
      } while (state.drawnNumbers.includes(roll));

      state.drawnNumbers.push(roll);
      state.currentNumber = roll;

      // Speak & sound
      speakNumber(roll);
      playLocalSound('draw');

      // Update Screen elements dynamically without refreshing entire page
      updateGameplayCallerDOM();
      highlightEligibleBoardCells();
    }

    // Handle Tap matches
    function handleGameplayCardTap(row, col, val) {
      if (!val || !state.gameActive || state.winner) return;

      const coord = `${row}-${col}`;
      if (state.drawnNumbers.includes(val)) {
        if (!state.markedCells.includes(coord)) {
          state.markedCells.push(coord);
          playLocalSound('success');
          
          // Re-style element manually to prevent fully rebuilding board
          const cell = document.getElementById(`gp-cell-${row}-${col}`);
          if (cell) {
            cell.className = `aspect-square flex items-center justify-center rounded-xl border text-sm md:text-lg font-black transition-all smooth-transition select-none cursor-pointer hover:scale-[1.05] ${state.selectedCardStyle.active}`;
          }

          checkMatchPatternEligibility();
        }
      } else {
        // Red flashing error feedback
        playLocalSound('alert');
        showNotification('این شماره هنوز قرعه‌کشی نشده است!');
      }
    }

    function checkMatchPatternEligibility() {
      let activeCardNumbers = state.myCard.flat().filter(Boolean);
      let matchedCount = 0;

      // Calculate total matched numbers
      state.myCard.forEach((row, rIdx) => {
        row.forEach((val, cIdx) => {
          if (val && state.markedCells.includes(`${rIdx}-${cIdx}`)) {
            matchedCount++;
          }
        });
      });

      document.getElementById('gameplay-match-count-label').innerText = `${matchedCount} / ${activeCardNumbers.length}`;

      let winClaimable = false;

      if (state.winningPattern === 'fullhouse') {
        if (matchedCount >= activeCardNumbers.length && activeCardNumbers.length > 0) {
          winClaimable = true;
        }
      } else if (state.winningPattern === 'single-line') {
        for (let r = 0; r < 3; r++) {
          let lineMatch = true;
          let counts = 0;
          for (let c = 0; c < 9; c++) {
            const v = state.myCard[r][c];
            if (v) {
              counts++;
              if (!state.markedCells.includes(`${r}-${c}`)) lineMatch = false;
            }
          }
          if (lineMatch && counts > 0) {
            winClaimable = true;
            break;
          }
        }
      } else {
        // Double lines check
        let lineCompletedCount = 0;
        for (let r = 0; r < 3; r++) {
          let lineMatch = true;
          let counts = 0;
          for (let c = 0; c < 9; c++) {
            const v = state.myCard[r][c];
            if (v) {
              counts++;
              if (!state.markedCells.includes(`${r}-${c}`)) lineMatch = false;
            }
          }
          if (lineMatch && counts > 0) lineCompletedCount++;
        }
        if (lineCompletedCount >= 2) {
          winClaimable = true;
        }
      }

      const claimBtn = document.getElementById('claim-victory-dabrna-btn');
      if (claimBtn) {
        if (winClaimable) {
          state.isDabrnaReady = true;
          claimBtn.disabled = false;
          claimBtn.className = "w-full py-4 rounded-2xl text-lg font-black tracking-widest shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-2 bg-slate-950 hover:bg-slate-900 text-white dark:bg-white dark:hover:bg-neutral-100 dark:text-slate-950 animate-bounce cursor-pointer";
        } else {
          state.isDabrnaReady = false;
          claimBtn.disabled = true;
          claimBtn.className = "w-full py-4 rounded-2xl text-lg font-black tracking-widest shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-2 bg-slate-100 dark:bg-zinc-800 text-slate-400 cursor-not-allowed border border-slate-200 dark:border-zinc-700 smooth-transition";
        }
      }
    }

    // --- STREAMING_CHUNK: Simulated bots chat triggers... ---
    function simulateBotsReactionAndMovements() {
      if (!state.gameActive || state.winner) return;

      // Random bot messages
      if (Math.random() < 0.05) {
        const bots = state.players.filter(p => p.isBot);
        if (bots.length > 0) {
          const randBot = bots[Math.floor(Math.random() * bots.length)];
          const quotes = [
            "عدد بعدی چنده؟ بگین دیگه!",
            "من فقط دوتا شماره لازم دارم دبرنا بشم 😍",
            "کاش شماره‌های منم بخونین",
            "امروز شانس ندارما کلا خالیه کارتم!",
            "دبرنااااااا نزدیکم!"
          ];
          const text = quotes[Math.floor(Math.random() * quotes.length)];
          addGameplayMiniMessage(randBot.name, text);
        }
      }

      // Check simulated bot win chance (only works if user hasn't finished first)
      if (state.drawnNumbers.length > 22 && Math.random() < 0.035) {
        const bots = state.players.filter(p => p.isBot);
        if (bots.length > 0) {
          const winnerBot = bots[Math.floor(Math.random() * bots.length)];
          triggerEndGameSequence(winnerBot.name, winnerBot.avatar, false);
        }
      }

      // Sync opponents bar
      syncBotPlayersPanel();
    }

    function addGameplayMiniMessage(sender, text) {
      const logs = document.getElementById('gameplay-mini-chat-logs');
      if (logs) {
        logs.innerHTML += `
          <div class="bg-slate-100 dark:bg-neutral-900/60 p-2 rounded-xl border border-slate-200/20">
            <span class="font-bold text-slate-600 dark:text-neutral-400 block text-[9px]">${sender}:</span>
            <p class="text-slate-800 dark:text-neutral-200 text-xs">${text}</p>
          </div>
        `;
        logs.scrollTop = logs.scrollHeight;
      }
    }

    function handleGameplayChatSubmit(e) {
      e.preventDefault();
      const input = document.getElementById('gameplay-mini-chat-input');
      const val = input ? input.value.trim() : '';
      if (!val) return;

      addGameplayMiniMessage(state.user.nickname, val);
      input.value = '';
      playLocalSound('click');
    }

    function claimDabrnaVictory() {
      if (!state.isDabrnaReady || state.isSpectating) return;
      triggerEndGameSequence(state.user.nickname, SVG_AVATARS[state.user.avatarIdx], true);
    }

    function triggerEndGameSequence(name, avatar, isUser) {
      state.gameActive = false;
      clearInterval(state.drawInterval);
      clearInterval(state.timerInterval);

      // Betting Calculations: Bank split with 10% host cut
      const rawBank = state.players.length * state.entryFee;
      const commissionCut = Math.floor(rawBank * 0.10);
      const netWinReward = rawBank - commissionCut;

      state.winner = { 
        name, 
        avatar, 
        isUser, 
        timer: state.timer,
        netReward: netWinReward
      };

      // Apply rewards
      if (isUser && !state.isSpectating) {
        state.user.coins += netWinReward;
        state.user.wins += 1;
        state.user.played += 1;
        state.user.xp += 150;
        state.user.level = Math.floor(state.user.xp / 100) + 1;
        
        saveUserCredentials();
        
        // Trigger Canvas Confetti
        if (window.confetti) {
          window.confetti({
            particleCount: 150,
            spread: 85,
            origin: { y: 0.6 }
          });
        }
      } else {
        if (!state.isSpectating) {
          state.user.played += 1;
          saveUserCredentials();
        }
      }

      // Draw Modal
      drawWinnerModalDOM();
    }

    function drawWinnerModalDOM() {
      const modal = document.getElementById('winner-modal-overlay');
      if (modal) {
        modal.className = "fixed inset-0 bg-slate-950/85 backdrop-blur-md z-50 flex items-center justify-center p-4 text-center text-white";
        modal.innerHTML = `
          <div class="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-neutral-800 text-slate-950 dark:text-white rounded-3xl max-w-sm w-full p-6 shadow-2xl relative overflow-hidden">
            <span class="text-5xl mb-3 block animate-bounce">🏆</span>
            <h2 class="text-2xl font-black mb-1 text-slate-900 dark:text-white">دبـرناااااا !</h2>
            <p class="text-xs text-slate-400 mb-6">مسابقه با موفقیت به پایان رسید</p>

            <div class="bg-slate-50 dark:bg-neutral-800/40 p-4 rounded-2xl mb-6 space-y-4 border border-slate-200/50 dark:border-neutral-800/60">
              <div class="w-16 h-16 rounded-full mx-auto border border-slate-300 dark:border-neutral-700 overflow-hidden">
                ${state.winner.avatar}
              </div>
              <div>
                <span class="text-sm font-bold block">${state.winner.name}</span>
                <span class="text-[9px] text-slate-400">قهرمان این دور مسابقات</span>
              </div>

              <div class="grid grid-cols-2 gap-2 text-xs border-t border-slate-200 dark:border-neutral-800 pt-3 text-right">
                <div>
                  <span class="text-[9px] text-slate-400 block">مدت زمان بازی:</span>
                  <span class="font-bold text-slate-800 dark:text-neutral-200 font-mono">${state.winner.timer} ثانیه</span>
                </div>
                <div>
                  <span class="text-[9px] text-slate-400 block">جایزه صندوق (داو خالص):</span>
                  <span class="font-bold text-amber-600 dark:text-amber-400 font-mono">${state.winner.isUser ? '+' + state.winner.netReward + ' سکه' : '۰'}</span>
                </div>
              </div>
            </div>

            <button onclick="dismissWinnerModalAndReturn()" class="w-full bg-slate-950 hover:bg-slate-900 dark:bg-white dark:hover:bg-neutral-100 text-white dark:text-black font-bold py-3 rounded-xl text-xs transition-all">
              بازگشت به لابی خانه
            </button>
          </div>
        `;
        playLocalSound('success');
      }
    }

    function dismissWinnerModalAndReturn() {
      const modal = document.getElementById('winner-modal-overlay');
      if (modal) modal.className = "hidden";
      navigateTo('home');
    }

    function endGameWithDraw() {
      state.gameActive = false;
      clearInterval(state.drawInterval);
      clearInterval(state.timerInterval);
      showNotification('مهره‌ها تمام شد! بازی بدون برنده پایان یافت.');
      navigateTo('home');
    }

    // --- STREAMING_CHUNK: Lucky Wheel interactive logic... ---
    function openLuckyWheel() {
      const container = document.getElementById('wheel-modal-container');
      if (container) {
        state.spinReward = null;
        container.className = "fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4 text-white";
        container.innerHTML = `
          <div class="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-neutral-800 text-slate-950 dark:text-white rounded-3xl max-w-sm w-full p-6 text-center shadow-2xl relative">
            <button onclick="closeLuckyWheel()" class="absolute top-4 left-4 bg-slate-100 hover:bg-slate-200 dark:bg-neutral-800 dark:hover:bg-neutral-700 text-slate-400 p-1 rounded-full text-xs">
              ✕
            </button>

            <h3 class="text-lg font-black mb-1">🎡 گردونه شانس دبرنا</h3>
            <p class="text-[10px] text-slate-400 mb-6">هر روز یک بار شانس خود را امتحان کنید</p>

            <div class="relative w-44 h-44 mx-auto mb-6">
              <div class="absolute top-0 left-1/2 -translate-x-1/2 -mt-3 text-2xl z-20">👇</div>
              <div 
                id="spinning-wheel-disk"
                class="w-full h-full rounded-full border-4 border-slate-950 dark:border-white overflow-hidden relative shadow-lg wheel-transition"
                style="background-image: conic-gradient(#ea580c 0 60deg, #2563eb 60deg 120deg, #7c3aed 120deg 180deg, #16a34a 180deg 240deg, #ca8a04 240deg 300deg, #1e293b 300deg 360deg)"
              >
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none text-[8px] font-bold text-white">
                  <span class="absolute rotate-30 translate-y-10 font-bold">۵۰ سکه</span>
                  <span class="absolute rotate-90 translate-y-10 font-bold">۵۰۰ سکه</span>
                  <span class="absolute rotate-150 translate-y-10 font-bold">۱۰۰ امتیاز</span>
                  <span class="absolute rotate-210 translate-y-10 font-bold">نشان طلا</span>
                  <span class="absolute rotate-270 translate-y-10 font-bold">۲۰۰ سکه</span>
                  <span class="absolute rotate-330 translate-y-10 font-bold">تم یلدا</span>
                </div>
              </div>
            </div>

            <div id="spin-reward-banner-box" class="hidden bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 p-2.5 rounded-xl mb-4 text-xs font-bold border border-emerald-500/20">
              جایزه
            </div>

            <button id="spin-wheel-action-btn" onclick="triggerLuckyWheelSpin()" class="w-full py-3 rounded-xl font-bold text-xs bg-slate-950 hover:bg-slate-900 dark:bg-white dark:hover:bg-neutral-100 text-white dark:text-black shadow-md transition-all">
              شروع چرخش گردونه
            </button>
          </div>
        `;
      }
    }

    function closeLuckyWheel() {
      const container = document.getElementById('wheel-modal-container');
      if (container) container.className = "hidden";
      playLocalSound('click');
    }

    function triggerLuckyWheelSpin() {
      if (state.isSpinning) return;
      state.isSpinning = true;
      playLocalSound('click');

      const disk = document.getElementById('spinning-wheel-disk');
      const actionBtn = document.getElementById('spin-wheel-action-btn');
      if (actionBtn) actionBtn.disabled = true;

      const deg = 1440 + Math.floor(Math.random() * 360);
      state.spinAngle = deg;
      if (disk) {
        disk.style.transform = `rotate(${deg}deg)`;
      }

      setTimeout(() => {
        state.isSpinning = false;
        const segment = Math.floor((deg % 360) / 60);
        const rewards = [
          { val: 50, label: '۵۰ سکه برنز' },
          { val: 500, label: '۵۰۰ سکه طلایی ویژه!' },
          { val: 100, label: '۱۰۰ امتیاز تجربه' },
          { val: 'شانس‌طلایی', label: 'مدال افتخار شانس طلایی' },
          { val: 200, label: '۲۰۰ سکه نقره' },
          { val: 'yalda', label: 'تم اختصاصی شب یلدا' }
        ];

        const res = rewards[segment] || rewards[0];
        state.spinReward = res;

        // Apply reward to user state
        if (typeof res.val === 'number') {
          state.user.coins += res.val;
          saveUserCredentials();
        } else if (res.val === 'شانس‌طلایی') {
          if (!state.user.badges.includes('شانس‌طلایی')) {
            state.user.badges.push('شانس‌طلایی');
          }
        }

        // Show reward box
        const banner = document.getElementById('spin-reward-banner-box');
        if (banner) {
          banner.innerText = `🎁 تبریک! جایزه شما: ${res.label}`;
          banner.classList.remove('hidden');
        }

        playLocalSound('success');
        updateHeaderStats();
        
        if (actionBtn) {
          actionBtn.disabled = false;
          actionBtn.innerText = 'دوباره بچرخون!';
        }
      }, 4000);
    }

    // --- STREAMING_CHUNK: Admin Dashboard Panel Logic... ---
    function adminGrantCoins(amount) {
      state.user.coins += amount;
      saveUserCredentials();
      showNotification(`تعداد ${amount} سکه به صورت دستوری شارژ شد.`);
      updateHeaderStats();
    }

    function adminResetAllData() {
      localStorage.clear();
      showNotification('تمام داده‌های لوکال ریست شد. بازی رفرش می‌شود...');
      setTimeout(() => {
        window.location.reload();
      }, 1500);
    }

    function adminTerminateRoom(code) {
      state.roomsList = state.roomsList.filter(r => r.code !== code);
      showNotification(`اتاق با کد ${code} فوراً بسته شد.`);
      renderCurrentScreen();
    }

    // Initialize Credentials on Window Load
    window.onload = function() {
      initUserCredentials();
      syncThemeUI();
      renderCurrentScreen();

      // Automatically transition from splash to login screen after delay
      setTimeout(() => {
        if (state.screen === 'splash') {
          navigateTo('login');
        }
      }, 2500);
    };
  </script>
</body>
</html>
