<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>دبرنا آنلاین | بازی گروهی سنتی ایرانی</title>
  
  <!-- Fast Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts - Vazirmatn for premium Persian typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

  <!-- Lucide Icons (Fast jsDelivr UMD bundle) -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Canvas Confetti for winning celebrations (jsDelivr) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- React & ReactDOM (Cloudflare CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (Cloudflare CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.12/babel.min.js" crossorigin></script>

  <style>
    body {
      font-family: 'Vazirmatn', sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }
    
    /* Smooth Scrollbar design */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
    }

    /* Pulse glow effect for Caller Number */
    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 0.5; }
      50% { transform: scale(1.03); opacity: 0.8; }
      100% { transform: scale(0.95); opacity: 0.5; }
    }
    .pulse-glow {
      animation: pulse-ring 2s infinite ease-in-out;
    }

    /* Glassmorphism modern container */
    .glass-panel {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .dark .glass-panel {
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
  </style>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              900: '#14532d',
            },
            accent: {
              yellow: '#fbbf24',
              pink: '#ec4899',
              blue: '#3b82f6',
              purple: '#a855f7'
            }
          },
          animation: {
            'bounce-slow': 'bounce 3s infinite',
            'spin-slow': 'spin 8s linear infinite',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

  <!-- Main Mount Point for React App -->
  <div id="root" class="flex-1 flex flex-col"></div>

  <!-- React Code with Babel translation -->
  <script type="text/babel">
    /** @jsx React.createElement */
    const { useState, useEffect, useRef, useMemo } = React;

    // Avatar list for players
    const AVATARS = [
      "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=120&h=120&q=80", 
      "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=120&h=120&q=80", 
      "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?auto=format&fit=crop&w=120&h=120&q=80", 
      "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&w=120&h=120&q=80", 
      "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=120&h=120&q=80", 
      "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=120&h=120&q=80"  
    ];

    // Background themes
    const THEMES = [
      { id: 'classic', name: 'کلاسیک ایرانی', bg: 'from-emerald-600 via-teal-700 to-cyan-800', primary: 'bg-emerald-600' },
      { id: 'neon', name: 'شیک و تاریک (نئون)', bg: 'from-slate-900 via-purple-900 to-indigo-950', primary: 'bg-purple-600' },
      { id: 'autumn', name: 'پاییز طلایی', bg: 'from-amber-600 via-orange-700 to-red-800', primary: 'bg-amber-600' },
      { id: 'yalda', name: 'جشن یلدا', bg: 'from-rose-800 via-red-900 to-slate-900', primary: 'bg-rose-700' }
    ];

    const BOT_NAMES = ["آرش_تندپنجه", "نازنین_خوش‌شانس", "کامیار_دبرناباز", "الهام_سکوت", "امیر_سریع", "رویا_قهرمان"];

    // Voice personalities for the caller
    const PERSUASIVE_VOICES = [
      { id: 'female-normal', name: 'مریم (رسمی)', lang: 'fa', rate: 1.0, pitch: 1.1 },
      { id: 'male-cool', name: 'پیمان (بامزه)', lang: 'fa', rate: 1.1, pitch: 0.95 },
      { id: 'english-fun', name: 'AI English (شادی)', lang: 'en', rate: 1.2, pitch: 1.1 }
    ];

    // Card designs
    const CARD_STYLES = [
      { id: 'standard', name: 'پیش‌فرض (سنتی)', bg: 'bg-white dark:bg-slate-900', cell: 'border-slate-300 dark:border-slate-700', active: 'bg-rose-500 text-white shadow-lg' },
      { id: 'gold', name: 'طلایی لوکس', bg: 'bg-amber-50 dark:bg-amber-950', cell: 'border-amber-300 dark:border-amber-800', active: 'bg-gradient-to-r from-yellow-500 to-amber-600 text-slate-900 font-bold' },
      { id: 'neon-cyan', name: 'نئون سایبر', bg: 'bg-slate-950', cell: 'border-cyan-500/30', active: 'bg-cyan-500 text-black shadow-[0_0_15px_rgba(6,182,212,0.6)] font-bold' }
    ];

    // Main App Component
    function App() {
      // Navigation / UI States
      const [screen, setScreen] = useState('splash'); 
      const [darkMode, setDarkMode] = useState(true);
      const [soundMuted, setSoundMuted] = useState(false);
      const [voiceLanguage, setVoiceLanguage] = useState('female-normal');

      // User State
      const [user, setUser] = useState({
        nickname: 'بازیکن مهمان',
        avatar: AVATARS[0],
        level: 3,
        xp: 140,
        coins: 1250,
        wins: 14,
        played: 45,
        badges: ['کارت‌باز ماهر', 'اولین برد', 'پسر شجاع']
      });

      // Settings State
      const [selectedTheme, setSelectedTheme] = useState(THEMES[1]); // Neon default
      const [selectedCardStyle, setSelectedCardStyle] = useState(CARD_STYLES[0]);
      
      // Multiplayer Room Setup State
      const [roomName, setRoomName] = useState('کافه دبرنا');
      const [isPrivate, setIsPrivate] = useState(false);
      const [roomPassword, setRoomPassword] = useState('');
      const [playerLimit, setPlayerLimit] = useState(6);
      const [gameSpeed, setGameSpeed] = useState(4); 
      const [winningPattern, setWinningPattern] = useState('fullhouse'); 
      const [autoDraw, setAutoDraw] = useState(true);

      // Current Game Room Instance
      const [roomCode, setRoomCode] = useState('');
      const [players, setPlayers] = useState([]);
      const [isHost, setIsHost] = useState(true);
      const [messages, setMessages] = useState([]);
      const [chatInput, setChatInput] = useState('');

      // Active Gameplay State
      const [myCard, setMyCard] = useState([]); 
      const [markedCells, setMarkedCells] = useState([]); 
      const [drawnNumbers, setDrawnNumbers] = useState([]);
      const [currentNumber, setCurrentNumber] = useState(null);
      const [gameActive, setGameActive] = useState(false);
      const [timer, setTimer] = useState(0);
      const [winner, setWinner] = useState(null);
      const [isDabrnaReady, setIsDabrnaReady] = useState(false);
      const [systemAlert, setSystemAlert] = useState(null);
      
      // Daily Reward & Spin State
      const [showSpin, setShowSpin] = useState(false);
      const [spinAngle, setSpinAngle] = useState(0);
      const [isSpinning, setIsSpinning] = useState(false);
      const [spinReward, setSpinReward] = useState(null);

      // Effects
      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      // Splash Screen Transition
      useEffect(() => {
        if (screen === 'splash') {
          const t = setTimeout(() => {
            setScreen('login');
          }, 3200);
          return () => clearTimeout(t);
        }
      }, [screen]);

      const speakNumber = (num) => {
        if (soundMuted) return;
        
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const voiceOpt = PERSUASIVE_VOICES.find(v => v.id === voiceLanguage);
          
          let text = `${num}`;
          if (voiceOpt.lang === 'fa') {
            const intros = [
              "عدد بعدی هست",
              "خوش شانس‌ها بردارن",
              "بشین روی صندلی شماره",
              "پیرزن نابینا خوابید رو",
              "خوشگل محله شماره",
              "ببین چی برات دراومد"
            ];
            const randomIndex = num % intros.length;
            text = `${intros[randomIndex]}! ${num}`;
          } else {
            text = `Next number is, ${num}`;
          }

          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = voiceOpt.lang === 'fa' ? 'fa-IR' : 'en-US';
          utterance.rate = voiceOpt.rate;
          utterance.pitch = voiceOpt.pitch;
          window.speechSynthesis.speak(utterance);
        }
      };

      const playLocalSound = (type) => {
        if (soundMuted) return;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          if (type === 'click') {
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.05);
          } else if (type === 'success') {
            osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); 
            osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); 
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.35);
          } else if (type === 'draw') {
            osc.frequency.setValueAtTime(330, ctx.currentTime);
            osc.frequency.setValueAtTime(392, ctx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
          } else if (type === 'alert') {
            osc.frequency.setValueAtTime(220, ctx.currentTime);
            osc.frequency.setValueAtTime(110, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.18, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
          }
        } catch (e) {
          console.log("Audio API support limited.");
        }
      };

      const generateDabrnaCard = () => {
        let card = Array(3).fill(null).map(() => Array(9).fill(null));
        let colNumbers = [];
        
        for (let col = 0; col < 9; col++) {
          let min = col === 0 ? 1 : col * 10;
          let max = col === 8 ? 90 : (col * 10) + 9;
          let pool = [];
          for (let i = min; i <= max; i++) pool.push(i);
          
          pool.sort(() => Math.random() - 0.5);
          let chosen = pool.slice(0, 3).sort((a, b) => a - b);
          colNumbers.push(chosen);
        }

        for (let col = 0; col < 9; col++) {
          for (let row = 0; row < 3; row++) {
            card[row][col] = colNumbers[col][row];
          }
        }

        for (let row = 0; row < 3; row++) {
          let emptyIndices = [];
          while (emptyIndices.length < 4) {
            let randIdx = Math.floor(Math.random() * 9);
            if (!emptyIndices.includes(randIdx)) {
              emptyIndices.push(randIdx);
            }
          }
          emptyIndices.forEach(colIdx => {
            card[row][colIdx] = null;
          });
        }
        return card;
      };

      useEffect(() => {
        let drawInterval;
        if (gameActive && autoDraw && !winner) {
          drawInterval = setInterval(() => {
            drawNextNumber();
          }, gameSpeed * 1000);
        }
        return () => clearInterval(drawInterval);
      }, [gameActive, drawnNumbers, autoDraw, winner, gameSpeed]);

      useEffect(() => {
        let timerInterval;
        if (gameActive && !winner) {
          timerInterval = setInterval(() => {
            setTimer(prev => prev + 1);
            simulateBotPlays();
          }, 1000);
        }
        return () => clearInterval(timerInterval);
      }, [gameActive, winner, drawnNumbers]);

      const drawNextNumber = () => {
        if (drawnNumbers.length >= 90) {
          setGameActive(false);
          setWinner({ name: 'هیچ‌کس! (اتمام شماره‌ها)', avatar: null, isUser: false });
          return;
        }

        let newNum;
        do {
          newNum = Math.floor(Math.random() * 90) + 1;
        } while (drawnNumbers.includes(newNum));

        const updatedDrawn = [...drawnNumbers, newNum];
        setDrawnNumbers(updatedDrawn);
        setCurrentNumber(newNum);
        speakNumber(newNum);
        playLocalSound('draw');

        checkDabrnaEligibility(updatedDrawn);
      };

      const handleCellTap = (rowIdx, colIdx, value) => {
        if (!gameActive || winner || !value) return;

        const cellCoord = `${rowIdx}-${colIdx}`;
        
        if (drawnNumbers.includes(value)) {
          if (markedCells.includes(cellCoord)) {
            playLocalSound('click');
          } else {
            playLocalSound('success');
            const updated = [...markedCells, cellCoord];
            setMarkedCells(updated);
            checkDabrnaEligibility(drawnNumbers, updated);
          }
        } else {
          playLocalSound('alert');
          showNotification("این شماره هنوز از گردونه خارج نشده است!");
        }
      };

      const showNotification = (msg) => {
        setSystemAlert(msg);
        setTimeout(() => setSystemAlert(null), 3000);
      };

      const checkDabrnaEligibility = (drawn = drawnNumbers, marked = markedCells) => {
        let totalNumbersInCard = 0;
        let matchedNumbers = 0;

        for (let r = 0; r < 3; r++) {
          for (let c = 0; c < 9; c++) {
            const val = myCard[r]?.[c];
            if (val) {
              totalNumbersInCard++;
              const isMarked = marked.includes(`${r}-${c}`);
              if (isMarked && drawn.includes(val)) {
                matchedNumbers++;
              }
            }
          }
        }

        if (winningPattern === 'fullhouse') {
          if (matchedNumbers >= totalNumbersInCard && totalNumbersInCard > 0) {
            setIsDabrnaReady(true);
          }
        } else if (winningPattern === 'single-line') {
          let lineCompleted = false;
          for (let r = 0; r < 3; r++) {
            let rowCompleted = true;
            let rowHasNumbers = false;
            for (let c = 0; c < 9; c++) {
              const val = myCard[r]?.[c];
              if (val) {
                rowHasNumbers = true;
                if (!marked.includes(`${r}-${c}`)) {
                  rowCompleted = false;
                }
              }
            }
            if (rowCompleted && rowHasNumbers) {
              lineCompleted = true;
              break;
            }
          }
          if (lineCompleted) {
            setIsDabrnaReady(true);
          }
        } else {
          let completedRowsCount = 0;
          for (let r = 0; r < 3; r++) {
            let rowCompleted = true;
            let rowHasNumbers = false;
            for (let c = 0; c < 9; c++) {
              const val = myCard[r]?.[c];
              if (val) {
                rowHasNumbers = true;
                if (!marked.includes(`${r}-${c}`)) {
                  rowCompleted = false;
                }
              }
            }
            if (rowCompleted && rowHasNumbers) {
              completedRowsCount++;
            }
          }
          if (completedRowsCount >= 2) {
            setIsDabrnaReady(true);
          }
        }
      };

      const claimDabrnaVictory = () => {
        if (!isDabrnaReady) {
          playLocalSound('alert');
          return;
        }

        playLocalSound('success');
        if (window.confetti) {
          window.confetti({
            particleCount: 150,
            spread: 80,
            origin: { y: 0.6 }
          });
        }

        const userWinner = {
          name: user.nickname,
          avatar: user.avatar,
          isUser: true,
          completionTime: timer,
          pointsGained: 250,
          coinsGained: 100
        };

        setWinner(userWinner);
        setGameActive(false);

        setUser(prev => ({
          ...prev,
          wins: prev.wins + 1,
          played: prev.played + 1,
          xp: prev.xp + 120,
          coins: prev.coins + 100,
          level: Math.floor((prev.xp + 120) / 100) + 1
        }));
      };

      const simulateBotPlays = () => {
        if (!gameActive || !currentNumber || winner) return;

        const baseProb = drawnNumbers.length / 110; 
        if (Math.random() < baseProb && drawnNumbers.length > 15) {
          const activeBots = players.filter(p => p.isBot);
          if (activeBots.length > 0) {
            const luckyBot = activeBots[Math.floor(Math.random() * activeBots.length)];
            
            const botWinner = {
              name: luckyBot.name,
              avatar: luckyBot.avatar,
              isUser: false,
              completionTime: timer,
              pointsGained: 0,
              coinsGained: 0
            };

            setWinner(botWinner);
            setGameActive(false);
            playLocalSound('alert');
            
            setMessages(prev => [
              ...prev,
              { id: Date.now(), sender: 'سیستم', text: ` بازیکن ${luckyBot.name} دبرنا کرد و برنده شد! 🏆`, isSystem: true }
            ]);
          }
        }

        if (Math.random() < 0.08) {
          const activeBots = players.filter(p => p.isBot);
          if (activeBots.length > 0) {
            const bot = activeBots[Math.floor(Math.random() * activeBots.length)];
            const botQuotes = [
              "وای شماره بعدی رو بگو!",
              "من فقط دوتا شماره لازم دارم دبرنا بشم 😍",
              "این سیستم چرا شماره‌های منو نمیگه؟ 😂",
              "شانس نداریما امروز کلا خالیه کارتم!",
              "چقدر طولش میدی بیا دیگه",
              "دبرنااااااا نزدیکم!"
            ];
            const quote = botQuotes[Math.floor(Math.random() * botQuotes.length)];
            setMessages(prev => [
              ...prev,
              { id: Date.now(), sender: bot.name, text: quote, avatar: bot.avatar }
            ]);
          }
        }
      };

      const sendChatMessage = (e) => {
        e.preventDefault();
        if (!chatInput.trim()) return;

        setMessages(prev => [
          ...prev,
          { id: Date.now(), sender: user.nickname, text: chatInput, avatar: user.avatar, isUser: true }
        ]);
        setChatInput('');
        playLocalSound('click');
      };

      const triggerLuckySpin = () => {
        if (isSpinning) return;
        playLocalSound('click');
        setIsSpinning(true);
        const randomDegrees = 1800 + Math.floor(Math.random() * 360);
        setSpinAngle(randomDegrees);

        setTimeout(() => {
          setIsSpinning(false);
          const segment = Math.floor((randomDegrees % 360) / 60);
          const rewards = [
            { type: 'coins', val: 50, label: '۵۰ سکه' },
            { type: 'coins', val: 500, label: '۵۰۰ سکه طلایی' },
            { type: 'xp', val: 100, label: '۱۰۰ امتیاز تجربه' },
            { type: 'badge', val: 'شانس‌طلایی', label: 'نشان شانس طلایی' },
            { type: 'coins', val: 200, label: '۲۰۰ سکه' },
            { type: 'theme', val: 'yalda', label: 'تم شب یلدا' }
          ];
          const result = rewards[segment] || rewards[0];
          setSpinReward(result);
          
          setUser(prev => {
            let updated = { ...prev };
            if (result.type === 'coins') updated.coins += result.val;
            if (result.type === 'xp') {
              updated.xp += result.val;
              updated.level = Math.floor((updated.xp) / 100) + 1;
            }
            if (result.type === 'badge' && !updated.badges.includes(result.val)) {
              updated.badges.push(result.val);
            }
            return updated;
          });

          playLocalSound('success');
        }, 3000);
      };

      return (
        <div className={`min-h-screen flex flex-col transition-all duration-300 ${selectedTheme.bg} bg-gradient-to-b text-white`}>
          
          {/* Header Bar */}
          <header className="glass-panel sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-md">
            <div className="flex items-center gap-3">
              <div className="bg-white/10 p-2 rounded-full cursor-pointer hover:bg-white/20 transition-all" onClick={() => { playLocalSound('click'); setScreen('home'); }}>
                <span className="text-xl font-black tracking-wider text-yellow-400">DABRNA 🎯</span>
              </div>
              <span className="text-xs bg-black/30 px-2.5 py-1 rounded-full text-green-300 hidden sm:inline">نسخه آنلاین ۲۰۲۶</span>
            </div>

            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2 bg-black/40 px-3 py-1.5 rounded-full text-sm">
                <i data-lucide="coins" className="w-4 h-4 text-amber-400"></i>
                <span className="font-bold text-amber-300">{user.coins}</span>
              </div>

              <button onClick={() => { playLocalSound('click'); setDarkMode(!darkMode); }} className="p-1.5 rounded-full hover:bg-white/10 text-yellow-300">
                {darkMode ? <i data-lucide="sun" className="w-5 h-5"></i> : <i data-lucide="moon" className="w-5 h-5"></i>}
              </button>

              <button onClick={() => { setSoundMuted(!soundMuted); }} className="p-1.5 rounded-full hover:bg-white/10">
                {soundMuted ? <i data-lucide="volume-x" className="w-5 h-5 text-red-400"></i> : <i data-lucide="volume-2" className="w-5 h-5 text-green-400"></i>}
              </button>
              
              <div className="flex items-center gap-2 cursor-pointer" onClick={() => { playLocalSound('click'); setScreen('profile'); }}>
                <img src={user.avatar} className="w-9 h-9 rounded-full ring-2 ring-emerald-400 object-cover" alt="User avatar" />

                </div>

                <div className="space-y-3">
                  <label className="text-xs text-slate-300 font-bold block">انتخاب گوینده صوتی دبرنا (صدا زدن هوشمند اعداد):</label>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                    {PERSUASIVE_VOICES.map((voice) => (
                      <button 
                        key={voice.id}
                        onClick={() => { playLocalSound('click'); setVoiceLanguage(voice.id); }}
                        className={`p-3 rounded-xl text-xs font-bold text-right border transition-all ${voiceLanguage === voice.id ? 'bg-emerald-500/20 border-emerald-500 text-emerald-300' : 'bg-black/20 border-transparent text-slate-200'}`}
                      >
                        <div className="font-extrabold">{voice.name}</div>
                        <span className="text-[10px] text-slate-400 block mt-1">زبان صوتی: {voice.lang === 'fa' ? 'فارسی' : 'انگلیسی'}</span>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="space-y-3">
                  <label className="text-xs text-slate-300 font-bold block">تم رنگی محیط بازی (طراحی زنده):</label>
                  <div className="grid grid-cols-2 gap-3">
                    {THEMES.map((th) => (
                      <div 
                        key={th.id}
                        onClick={() => { playLocalSound('click'); setSelectedTheme(th); }}
                        className={`p-4 rounded-2xl cursor-pointer border-2 transition-all ${selectedTheme.id === th.id ? 'border-yellow-400 scale-102' : 'border-transparent'}`}
                        style={{ background: 'rgba(0,0,0,0.4)' }}
                      >
                        <div className={`w-full h-8 rounded-lg bg-gradient-to-r ${th.bg} mb-2`}></div>
                        <span className="text-xs font-bold text-white">{th.name}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="space-y-3">
                  <label className="text-xs text-slate-300 font-bold block">پوسته کارت بازی دبرنا شخصی شما:</label>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    {CARD_STYLES.map((style) => (
                      <div 
                        key={style.id}
                        onClick={() => { playLocalSound('click'); setSelectedCardStyle(style); }}
                        className={`p-3 rounded-xl cursor-pointer border text-center transition-all ${selectedCardStyle.id === style.id ? 'border-emerald-500 bg-emerald-500/10' : 'border-slate-800 bg-black/10'}`}
                      >
                        <span className="text-xs font-bold block mb-1 text-white">{style.name}</span>
                        <div className="flex gap-1 justify-center mt-2">
                          <span className="w-5 h-5 rounded-md bg-slate-200 dark:bg-slate-800 border border-slate-600 inline-block text-[8px] text-center leading-5 text-red-500">۲۲</span>
                          <span className="w-5 h-5 rounded-md bg-rose-500 inline-block text-[8px] text-center leading-5 text-white">۴۵</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

          </main>

          {}
          {/* LUCKY WHEEL POPUP MODAL */}
          {showSpin && (
            <div className="fixed inset-0 bg-slate-950/85 backdrop-blur-md z-50 flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl max-w-sm w-full p-6 text-center shadow-2xl relative">
                <button onClick={() => { playLocalSound('click'); setShowSpin(false); }} className="absolute top-4 left-4 bg-slate-800 hover:bg-slate-700 text-slate-400 p-1.5 rounded-full">
                  <i data-lucide="x" className="w-4 h-4"></i>
                </button>

                <h3 className="text-xl font-black text-amber-300 mb-1">🎡 گردونه شانس دبرنا</h3>
                <p className="text-slate-400 text-xs mb-6">شانس خود را امتحان کنید و هدیه ببرید</p>

                <div className="relative w-48 h-48 mx-auto mb-6">
                  <div className="absolute top-0 left-1/2 -translate-x-1/2 -mt-4 text-3xl z-20">👇</div>
                  
                  <div 
                    className="w-full h-full rounded-full border-4 border-amber-400 overflow-hidden relative shadow-lg transition-transform duration-3000 ease-out"
                    style={{ 
                      transform: `rotate(${spinAngle}deg)`,
                      backgroundImage: 'conic-gradient(#ec4899 0 60deg, #3b82f6 60deg 120deg, #a855f7 120deg 180deg, #10b981 180deg 240deg, #f59e0b 240deg 300deg, #6366f1 300deg 360deg)'
                    }}
                  >
                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none text-[10px] font-bold text-white">
                      <span className="absolute rotate-30 translate-y-12">۵۰ سکه</span>
                      <span className="absolute rotate-90 translate-y-12">۵۰۰ سکه</span>
                      <span className="absolute rotate-150 translate-y-12">۱۰۰ امتیاز</span>
                      <span className="absolute rotate-210 translate-y-12">نشان طلایی</span>
                      <span className="absolute rotate-270 translate-y-12">۲۰۰ سکه</span>
                      <span className="absolute rotate-330 translate-y-12">تم یلدا</span>
                    </div>
                  </div>
                </div>

                {spinReward && (
                  <div className="bg-emerald-500/20 text-emerald-300 p-3 rounded-xl mb-4 text-xs font-bold border border-emerald-500/30">
                    🎉 تبریک! شما هدیه <span className="text-white text-sm">{spinReward.label}</span> را برنده شدید!
                  </div>
                )}

                <button 
                  onClick={triggerLuckySpin}
                  disabled={isSpinning}
                  className={`w-full py-3.5 rounded-2xl font-black text-lg transition-all ${isSpinning ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-slate-950 shadow-lg'}`}
                >
                  {isSpinning ? 'در حال چرخش گردونه...' : 'بچرخونش!'}
                </button>
              </div>
            </div>
          )}

          <footer className="glass-panel text-center py-4 text-xs text-slate-400 mt-auto border-t border-white/5">
            <p>تمامی حقوق محفوظ است © دبرنا آنلاین ۲۰۲۶ | شاد بمانید و کنار هم بخندید.</p>
          </footer>

        </div>
      );
    }

    function IconsInitializer() {
      useEffect(() => {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      });
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
